version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: abac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abac
      POSTGRES_PASSWORD: abac123
      POSTGRES_DB: abac
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abac -d abac"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abac-net

  redis:
    image: redis:7-alpine
    container_name: abac-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - abac-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abac-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://abac:abac123@postgres:5432/abac?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      SERVER_PORT: 8080
      ADMIN_TOKEN: admin-secret-token-change-me
      GIN_MODE: release
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - abac-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: abac-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - abac-net

volumes:
  postgres_data:
  redis_data:

networks:
  abac-net:
    driver: bridge
